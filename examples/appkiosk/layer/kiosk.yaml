# METABEGIN
# X-Env-Layer-Name: example-kiosk
# X-Env-Layer-Category: example
# X-Env-Layer-Desc: Example webkiosk layer showing how to define configuration
#  variables, declare packages and create a start up script. We depend on the
#  RPi user creds layer as we want to run the kiosk as the user it creates, and
#  we depend on systemd because we install a systemd service to start the kiosk.
# X-Env-Layer-Requires: rpi-user-credentials,systemd-net-min
#
# X-Env-VarPrefix: kiosk
#
# X-Env-Var-url: https://example.com
# X-Env-Var-url-Desc: Default URL the web kiosk will load at startup.
# X-Env-Var-url-Required: n
# X-Env-Var-url-Valid: regex:^https://[a-zA-Z0-9.-]+[a-zA-Z0-9]/?.*$
# X-Env-Var-url-Set: y
# METAEND
---
mmdebstrap:
  packages:
  - pkg-config
  - qt6-base-dev-tools
  - qt6-tools-dev
  - qt6-wayland
  - qml6-module-qtwayland-compositor
  - ninja-build
    - qt6-base-dev
    - qt6-declarative-dev
    - qml6-module-qtquick
    - qml6-module-qtquick-controls
    - qml6-module-qtquick-layouts
    - qt6-qmltooling-plugins
    - qml6-module-qtquick-window
    - qml6-module-qtquick-templates
    - qml6-module-qtqml-workerscript
    - qml6-module-qtquick-timeline
  - cmake
  - build-essential
    - git
    - gpiod
    - libgpiod-dev
    - libpaho-mqtt-dev
    - libpaho-mqttpp-dev
    - libssl-dev
  
  customize-hooks:
    - |
      chroot $1 bash -lc '
        set -euo pipefail
        APPDIR=/opt/postojna-kraskviz
        if [ ! -d "$APPDIR/.git" ]; then
          git clone https://github.com/rps-x-dev/postojna-kraskviz.git "$APPDIR"
        else
          git -C "$APPDIR" pull --ff-only || true
        fi
        mkdir -p "$APPDIR/build"
        cd "$APPDIR/build"
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release .. || cmake -DCMAKE_BUILD_TYPE=Release ..
        command -v ninja >/dev/null 2>&1 && ninja -j"$(nproc)" || make -j"$(nproc)"
      '
